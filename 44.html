<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel</title>
    
    <!-- Admin Favicon -->
    <link rel="icon" type="image/png" href="" id="dynamicFavicon">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        /* --- THEME VARIABLES --- */
        :root {
            --bg-body: #000000;       
            --bg-card: rgba(20, 20, 20, 0.7); 
            --text-main: #ffffff;     
            --text-muted: #aaaaaa;
            --accent-color: #a855f7;  
            --border-color: rgba(255,255,255,0.15);
        }

        /* GLOBAL RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #000000; 
            color: var(--text-main); 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            transition: color 0.3s;
        }

        /* --- 🔥🔥 NEW LOADING SCREEN CSS 🔥🔥 --- */
        #app-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 100000; /* Highest Z-Index */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .loader-spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px var(--accent-color);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text {
            font-size: 14px; letter-spacing: 3px; font-weight: 600;
            color: #fff; text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- MOBILE BACKGROUND LAYER --- */
        #mobile-bg-layer {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; height: 100%; z-index: -10; 
            background-size: cover; background-position: center; 
            border-left: 1px solid #222; border-right: 1px solid #222;
        }
        #mobile-bg-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        /* HEADER */
        .header-bar { 
            height: 65px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; flex-shrink: 0; z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo-img { width: 35px; height: 35px; object-fit: contain; display: none; border-radius: 6px; }
        .header-icon { font-size: 22px; color: var(--accent-color); }
        .header-title { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .header-settings-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
            width: 38px; height: 38px; border-radius: 10px; color: var(--text-main);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }

        /* CONTENT AREA */
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 85px; position: relative; z-index: 1; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS & INPUTS */
        .info-box { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 8px; font-size: 13px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent-color); background: rgba(0,0,0,0.5); }
        
        .btn-primary { width: 100%; padding: 12px; background: var(--accent-color); border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-save { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }

        /* GALLERY */
        .upload-box { width: 100%; height: 160px; border: 2px dashed var(--border-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); margin-bottom: 15px; overflow: hidden; }
        .upload-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .gallery-item { background: var(--bg-card); border-radius: 10px; overflow: hidden; position: relative; border: 1px solid var(--border-color); height: 160px; display: flex; flex-direction: column; }
        .gallery-item img { width: 100%; height: 110px; object-fit: cover; background: #000; }
        .item-info { padding: 5px; font-size: 10px; color: var(--text-muted); text-align: center; height: 50px; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
        .action-btns { position: absolute; top: 5px; right: 5px; display: flex; flex-direction: column; gap: 5px; }
        .card-btn { width: 25px; height: 25px; border-radius: 5px; border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; backdrop-filter: blur(4px); }
        .del-btn { background: rgba(220, 38, 38, 0.8); }
        .edit-btn { background: rgba(37, 99, 235, 0.8); }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; font-size: 9px; gap: 3px; width: 25%; cursor: pointer; transition: 0.3s; }
        .nav-btn i { font-size: 18px; margin-bottom: 2px; }
        .nav-btn.active { color: var(--accent-color); }

        /* SHEET & MODALS */
        .admin-sheet { position: fixed; top: 0; right: 0; width: 85%; max-width: 320px; height: 100%; background: #000; z-index: 5000; border-left: 1px solid var(--border-color); transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; box-shadow: -5px 0 30px rgba(0,0,0,0.8); }
        .admin-sheet.active { transform: translateX(0); }
        .sheet-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 16px; background: #111; }
        .sheet-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }
        .sidebar-section { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .sidebar-title { color: var(--accent-color); font-size: 12px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        
        /* PICKER & MODAL STYLES */
        .color-group-container { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
        .color-doll { width: 25px; height: 25px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; position: relative; }
        .color-doll.active { border: 2px solid #fff; box-shadow: 0 0 8px var(--accent-color); transform: scale(1.1); z-index: 5; }
        .color-add-btn { width: 25px; height: 25px; border-radius: 50%; border: 1px dashed #666; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #666; font-size: 10px; }
        #mini-picker-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5500; display: none; }
        #mini-picker-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 260px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; z-index: 6000; opacity: 0; pointer-events: none; transition: all 0.2s; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #mini-picker-popup.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; outline: none; margin: 0; cursor: pointer; }
        #picker-hue { background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); }
        #picker-alpha { background: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 8px 8px; background-color: #fff; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border: 2px solid #000; }
        #picker-preview-box { width: 100%; height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 10px 10px; background-color: #333; overflow: hidden; position: relative; margin-bottom: 15px; }
        #picker-preview-color { position: absolute; inset: 0; }
        .picker-label { font-size: 10px; color: #aaa; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 6000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-content { background: #111; width: 100%; max-width: 350px; padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); }
        #customToast { position:fixed; top:20px; right:20px; background:#111; border:1px solid var(--accent-color); color:var(--accent-color); padding:8px 20px; border-radius:30px; transform:translateX(150%); transition:0.3s; z-index:8000; font-size:12px; font-weight:600; border-left: 5px solid var(--accent-color); }

        /* LOGIN PAGE */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:none; justify-content:center; align-items:center; flex-direction:column; animation: fadeIn 0.5s; }
        .login-box { width:85%; max-width:320px; background:#111; padding:30px; border-radius:20px; border:1px solid var(--border-color); text-align:center; }

        @media (min-width: 768px) { .content-area, .bottom-nav, .header-bar, .admin-sheet { max-width: 500px; margin: 0 auto; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); } .bottom-nav, .header-bar, .admin-sheet { left: 50%; transform: translateX(-50%); } }
    </style>

    <script>
        (function(){
            try {
                const t = JSON.parse(localStorage.getItem('admin_theme')||'{}');
                const r = document.documentElement.style;
                if(t.bgCard) r.setProperty('--bg-card', t.bgCard);
                if(t.accent) r.setProperty('--accent-color', t.accent);
            } catch(e){}
        })();
    </script>
</head>
<body>

    <!-- 🔥🔥 LOADING SCREEN 🔥🔥 -->
    <div id="app-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading Panel...</div>
    </div>

    <!-- MOBILE BACKGROUND LAYER -->
    <div id="mobile-bg-layer"><div id="mobile-bg-overlay"></div></div>
    <div id="customToast"><i class="fas fa-check-circle"></i> <span>Success!</span></div>

    <!-- PICKER POPUP -->
    <div id="mini-picker-backdrop" onclick="closeColorPicker()"></div>
    <div id="mini-picker-popup">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">
            <span style="font-size:12px; font-weight:bold; color:#fff;">Color Editor</span>
            <button onclick="closeColorPicker()" style="background:none; border:none; color:#aaa; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div id="picker-preview-box"><div id="picker-preview-color" style="background-color: #6366f1;"></div></div>
        <div style="margin-bottom:15px;">
            <div class="picker-label"><span>COLOR (HUE)</span></div>
            <input type="range" id="picker-hue" min="0" max="360" value="240">
        </div>
        <div style="margin-bottom:15px;">
            <div class="picker-label"><span>TRANSPARENCY</span> <span id="opacity-val">100%</span></div>
            <input type="range" id="picker-alpha" min="0" max="100" value="100">
        </div>
        <button onclick="applyCustomColor()" class="btn-primary" style="padding:8px; font-size:12px;">APPLY COLOR</button>
    </div>

    <!-- LOGIN (Hidden initially) -->
    <div id="loginOverlay">
        <div class="login-box">
            <i class="fas fa-fingerprint" style="color:var(--accent-color); font-size:40px; margin-bottom:20px;"></i>
            <h3 style="color:#fff; margin-bottom:10px;">Security Check</h3>
            <input type="tel" id="adminPass" placeholder="Enter PIN" style="width:100%; padding:15px; text-align:center; background:#000; border:1px solid #333; color:#fff; border-radius:10px; font-size:18px; letter-spacing:5px; margin-bottom:15px;">
            <button onclick="checkLogin()" style="width:100%; padding:15px; background:var(--accent-color); border:none; color:#fff; border-radius:10px; font-weight:bold;">UNLOCK</button>
            <p id="loginError" style="color:#ef4444; margin-top:15px; opacity:0; font-size:12px;">Incorrect PIN</p>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header-bar">
        <div class="header-left">
            <img id="adminHeaderLogoDisplay" class="header-logo-img" src="" alt="Logo">
            <i id="adminHeaderIconDisplay" class="fas fa-cube header-icon"></i>
            <span id="adminHeaderTitleDisplay" class="header-title">Admin Panel</span>
        </div>
        <button class="header-settings-btn" onclick="openAdminSheet()"><i class="fas fa-cog"></i></button>
    </div>

    <!-- CONTENT -->
    <div class="content-area">
        <div id="upload" class="tab-content active">
            <div class="info-box">
                <h4 style="color:var(--text-main); margin-bottom:15px;">New Post</h4>
                <div class="form-group"><label>Image URL</label><input type="text" id="imgUrlInput" placeholder="https://..." oninput="previewImage()"></div>
                <div class="upload-box">
                    <img id="preview">
                    <div id="uploadPlaceholder" style="text-align:center; color:var(--text-muted);"><i class="fas fa-cloud-upload-alt" style="font-size:24px;"></i><br>Preview</div>
                </div>
                <div class="form-group"><label>Title</label><input type="text" id="fullTitle" placeholder="Enter Title"></div>
                <div class="form-group"><label>Prompt</label><textarea id="promptText" placeholder="Details..." style="height:70px;"></textarea></div>
                <button class="btn-primary" onclick="publishData()">Publish Now</button>
            </div>
        </div>

        <div id="gallery" class="tab-content">
            <div style="position:sticky; top:0; z-index:5; padding-bottom:10px;">
                <input type="text" id="searchBox" placeholder="Search Gallery..." oninput="filterGallery()" style="background:var(--bg-card); backdrop-filter:blur(5px);">
            </div>
            <div class="gallery-grid" id="galleryContainer">
                <p style="text-align:center; grid-column:span 2; color:var(--text-muted); margin-top:20px;">Loading Data...</p>
            </div>
        </div>

        <div id="ads" class="tab-content">
            <div class="info-box">
                <h4 style="color:var(--text-main); margin-bottom:15px;">Manage Ads</h4>
                <div class="form-group"><label>Banner Image URL</label><input type="text" id="adImgUrl"></div>
                <div class="form-group"><label>Click Target URL</label><input type="text" id="adTargetUrl"></div>
                <button class="btn-primary" onclick="addNewAd()">Add Banner</button>
                <hr style="border-color:var(--border-color); margin:20px 0;">
                <div id="adListContainer"></div>
            </div>
        </div>

        <div id="social_tab" class="tab-content">
            <div class="info-box" style="border-left: 3px solid var(--accent-color);">
                <h4 style="color:var(--accent-color); margin-bottom:15px;">Website Identity</h4>
                <div class="form-group"><label>Website Name</label><input type="text" id="userSiteTitle"></div>
                <div class="form-group"><label>Logo URL</label><input type="text" id="logoUrlInput"></div>
                <div class="form-group"><label>Favicon URL</label><input type="text" id="userFavicon"></div>
                <button class="btn-save" onclick="saveUserConfig()">Save Identity</button>
            </div>
            <div class="info-box">
                <h4 style="color:var(--text-muted); margin-bottom:15px;">Social Links</h4>
                <div class="form-group"><label>Telegram</label><input type="text" id="tgLink"></div>
                <div class="form-group"><label>Facebook</label><input type="text" id="fbLink"></div>
                <div class="form-group"><label>TikTok</label><input type="text" id="tiktokLink"></div>
                <div class="form-group"><label>YouTube</label><input type="text" id="youtubeLink"></div>
                <div class="form-group"><label>Footer</label><input type="text" id="footerText"></div>
                <button class="btn-save" onclick="saveUserConfig()">Save Socials</button>
            </div>
        </div>
    </div>

    <!-- SHEET -->
    <div id="adminSheet" class="admin-sheet">
        <div class="sheet-header"><span>Settings</span><button onclick="closeAdminSheet()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-times"></i></button></div>
        <div class="sheet-body">
            <div class="sidebar-section">
                <div class="sidebar-title">Configuration</div>
                <div class="form-group"><label>Panel Name</label><input type="text" id="adminSiteTitle"></div>
                <div class="form-group"><label>Header Logo</label><input type="text" id="adminHeaderLogo"></div>
                <div class="form-group"><label>Favicon</label><input type="text" id="adminFavicon"></div>
                <div class="form-group"><label>Tab Title</label><input type="text" id="adminBrowserTitle"></div>
                <button class="btn-save" onclick="saveAdminBranding()">Update Branding</button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Customizer</div>
                <div class="form-group">
                    <label>Accent</label>
                    <div class="color-group-container" id="accent-group">
                        <div onclick="setThemeColor('accent', '#6366f1')" class="color-doll" style="background:#6366f1"></div>
                        <div onclick="setThemeColor('accent', '#10b981')" class="color-doll" style="background:#10b981"></div>
                        <div onclick="setThemeColor('accent', '#f43f5e')" class="color-doll" style="background:#f43f5e"></div>
                        <div class="color-add-btn" onclick="openColorPicker('accent')"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Card Color</label>
                    <div class="color-group-container">
                        <div onclick="setThemeColor('bgCard', 'rgba(30, 41, 59, 0.7)')" class="color-doll" style="background:#1e293b"></div>
                        <div onclick="setThemeColor('bgCard', 'rgba(0, 0, 0, 0.6)')" class="color-doll" style="background:#000"></div>
                        <div class="color-add-btn" onclick="openColorPicker('bgCard')"><i class="fas fa-plus"></i></div>
                    </div>
                </div>
                <div class="form-group"><label>BG Image</label><input type="text" id="bgImageInput" onchange="saveThemeToFirebase()"></div>
            </div>
            <div class="sidebar-section" style="margin-top:auto; border-bottom:none;">
                <div class="sidebar-title" style="color:#ef4444;">Security</div>
                <div class="form-group"><label>Change PIN</label><input type="text" id="adminPasswordInput"></div>
                <button class="btn-save" style="border-color:#ef4444; color:#ef4444;" onclick="saveAdminBranding()">Update PIN</button>
            </div>
            <div style="margin-top:10px; padding-top:10px; border-top:1px solid #222;">
                <button onclick="logoutAdmin()" style="width:100%; padding:12px; background:#222; border:1px solid #ef4444; color:#ef4444; border-radius:8px; font-weight:bold;">LOGOUT</button>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--text-main); margin-bottom:15px;">Edit</h3>
            <input type="hidden" id="editKey">
            <div class="form-group"><label>Title</label><input type="text" id="editTitle"></div>
            <div class="form-group"><label>URL</label><input type="text" id="editUrl"></div>
            <div class="form-group"><label>Prompt</label><textarea id="editPrompt" style="height:80px;"></textarea></div>
            <button class="btn-primary" onclick="updateImageData()">Update</button>
            <button onclick="closeEditModal()" style="width:100%; padding:10px; background:transparent; border:1px solid var(--border-color); color:var(--text-muted); border-radius:10px; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <!-- NAV -->
    <div class="bottom-nav">
        <button class="nav-btn active" id="btn-upload" onclick="switchTab('upload')"><i class="fas fa-plus-square"></i> Add</button>
        <button class="nav-btn" id="btn-gallery" onclick="switchTab('gallery')"><i class="fas fa-th-large"></i> Gallery</button>
        <button class="nav-btn" id="btn-ads" onclick="switchTab('ads')"><i class="fas fa-ad"></i> Ads</button>
        <button class="nav-btn" id="btn-social_tab" onclick="switchTab('social_tab')"><i class="fas fa-info-circle"></i> Social</button>
    </div>

<script>
    // FIREBASE
    const firebaseConfig = { apiKey: "AIzaSyDtHMaaR7d4ACgOrdHfimjzx-xyuS0_CkI", authDomain: "image-font-manager-fc822.firebaseapp.com", databaseURL: "https://image-font-manager-fc822-default-rtdb.firebaseio.com", projectId: "image-font-manager-fc822", storageBucket: "image-font-manager-fc822.firebasestorage.app", messagingSenderId: "788118912273", appId: "1:788118912273:web:4f07cebc5803f733dfe0b0" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        const p = document.getElementById('adminPass').value;
        db.ref('site_settings/adminPassword').once('value', s => {
            if(p === (s.val()||'12233')) {
                localStorage.setItem('admin_sess', Date.now()+300000);
                document.getElementById('loginOverlay').style.display='none';
            } else document.getElementById('loginError').style.opacity='1';
        });
    }
    function logoutAdmin() { localStorage.removeItem('admin_sess'); location.reload(); }
    
    // UPDATED ONLOAD LOGIC FOR LOADER
    window.onload = function() {
        // 1. Show Loader for 2 seconds
        setTimeout(() => {
            const loader = document.getElementById('app-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500); // Remove loader

            // 2. Check Login Status AFTER loader
            if(!localStorage.getItem('admin_sess') || Date.now() > parseInt(localStorage.getItem('admin_sess'))) {
                document.getElementById('loginOverlay').style.display = 'flex'; // Show Login
            } else {
                loadAllData(); // Already logged in
            }
        }, 2000); // 2 Seconds Wait

        switchTab(localStorage.getItem('activeTab')||'upload');
        loadAllData();
    };

    function switchTab(id) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('btn-'+id).classList.add('active'); localStorage.setItem('activeTab', id); }
    function openAdminSheet() { document.getElementById('adminSheet').classList.add('active'); }
    function closeAdminSheet() { document.getElementById('adminSheet').classList.remove('active'); }

    let activeColors = { accent: '', bgBody: '', bgCard: '' };
    function loadAllData() {
        db.ref('site_settings').on('value', s => {
            const d = s.val() || {};
            document.getElementById('userSiteTitle').value = d.userSiteTitle||""; 
            document.getElementById('logoUrlInput').value = d.logoUrl||"";
            document.getElementById('userFavicon').value = d.userFavicon||"";
            document.getElementById('tgLink').value = d.tgLink||"";
            document.getElementById('fbLink').value = d.fbLink||"";
            document.getElementById('tiktokLink').value = d.tiktokLink||"";
            document.getElementById('youtubeLink').value = d.youtubeLink||""; 
            document.getElementById('footerText').value = d.footerText||"";
            if(d.adminSiteTitle) { document.getElementById('adminSiteTitle').value = d.adminSiteTitle; document.getElementById('adminHeaderTitleDisplay').innerText = d.adminSiteTitle; }
            if(d.adminHeaderLogo) { document.getElementById('adminHeaderLogo').value = d.adminHeaderLogo; document.getElementById('adminHeaderLogoDisplay').src = d.adminHeaderLogo; document.getElementById('adminHeaderLogoDisplay').style.display = 'block'; document.getElementById('adminHeaderIconDisplay').style.display = 'none'; }
            if(d.adminFavicon) { document.getElementById('adminFavicon').value = d.adminFavicon; document.getElementById('dynamicFavicon').href = d.adminFavicon; }
            if(d.adminBrowserTitle) { document.getElementById('adminBrowserTitle').value = d.adminBrowserTitle; document.title = d.adminBrowserTitle; }
            document.getElementById('adminPasswordInput').value = d.adminPassword||"";
            if(d.theme) { activeColors = d.theme; applyTheme(d.theme); document.getElementById('bgImageInput').value = d.theme.bgImage || ""; }
        });
        db.ref('gallery_images').on('value', s => {
            const gal = document.getElementById('galleryContainer'); gal.innerHTML="";
            const items = []; s.forEach(x => { const val = x.val(); items.push({ k: x.key, url: val.url, fullTitle: val.fullTitle, shortTitle: val.shortTitle, prompt: val.prompt }); });
            items.reverse(); window.galleryData = items;
            if(items.length===0) gal.innerHTML="<p style='color:var(--text-muted);grid-column:span 2;text-align:center;'>No Images</p>";
            items.forEach(i => {
                const d = document.createElement('div'); d.className='gallery-item';
                d.innerHTML = `<div style="position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.6);padding:2px 5px;border-radius:4px;font-size:10px;color:#fff;">#${i.shortTitle}</div><div class="action-btns"><button class="card-btn edit-btn" onclick="openEdit('${i.k}')"><i class="fas fa-pen"></i></button><button class="card-btn del-btn" onclick="delItem('${i.k}')"><i class="fas fa-trash"></i></button></div><img src="${i.url}"><div class="item-info">${i.fullTitle}</div>`;
                gal.appendChild(d);
            });
        });
        db.ref('banner_ads').on('value', s => {
            const c = document.getElementById('adListContainer'); c.innerHTML="";
            s.forEach(x => {
                const d = document.createElement('div');
                d.innerHTML = `<div style="display:flex;align-items:center;gap:10px; background:var(--bg-card); padding:8px; border-radius:8px; border:1px solid var(--border-color); margin-bottom:5px;"><img src="${x.val().url}" style="width:50px;height:30px;object-fit:cover;border-radius:4px;"><div style="font-size:10px;color:var(--text-muted);width:120px;">${x.val().targetUrl}</div><button onclick="db.ref('banner_ads/${x.key}').remove()" style="color:#ef4444;background:none;border:none;margin-left:auto;"><i class="fas fa-trash"></i></button></div>`;
                c.appendChild(d);
            });
        });
    }

    function publishData() {
        const u = document.getElementById('imgUrlInput').value, t = document.getElementById('fullTitle').value;
        if(!u||!t) return showToast("Info Missing!");
        let max=0; if(window.galleryData) window.galleryData.forEach(i=>{ const n=parseInt(i.shortTitle); if(!isNaN(n) && n>max) max=n; });
        db.ref('gallery_images').push({ url:u, fullTitle:t, prompt:document.getElementById('promptText').value, shortTitle: (max+1).toString(), timestamp: firebase.database.ServerValue.TIMESTAMP }).then(()=>{ showToast("Published!"); document.getElementById('imgUrlInput').value=""; document.getElementById('fullTitle').value=""; document.getElementById('promptText').value=""; document.getElementById('preview').style.display='none'; });
    }
    function previewImage() { const u = document.getElementById('imgUrlInput').value, p = document.getElementById('preview'); if(u) { p.src=u; p.style.display='block'; document.getElementById('uploadPlaceholder').style.display='none'; } else { p.style.display='none'; document.getElementById('uploadPlaceholder').style.display='block'; } }
    function addNewAd() { const u = document.getElementById('adImgUrl').value, t = document.getElementById('adTargetUrl').value; if(u&&t) db.ref('banner_ads').push({url:u, targetUrl:t}).then(()=>{ showToast("Ad Added"); document.getElementById('adImgUrl').value=""; }); }
    window.openEdit = function(k) { const i = window.galleryData.find(x=>x.k===k); document.getElementById('editKey').value=k; document.getElementById('editUrl').value=i.url; document.getElementById('editTitle').value=i.fullTitle; document.getElementById('editPrompt').value=i.prompt; document.getElementById('editModal').classList.add('active'); }
    function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
    window.updateImageData = function() { const k = document.getElementById('editKey').value; db.ref('gallery_images/'+k).update({ url: document.getElementById('editUrl').value, fullTitle: document.getElementById('editTitle').value, prompt: document.getElementById('editPrompt').value }).then(()=>{ showToast("Updated"); closeEditModal(); }); }
    window.delItem = function(k) { if(confirm("Delete?")) db.ref('gallery_images/'+k).remove(); }
    function filterGallery() { const q = document.getElementById('searchBox').value.toLowerCase(); document.querySelectorAll('.gallery-item').forEach(e => e.style.display = e.innerText.toLowerCase().includes(q) ? 'flex' : 'none'); }

    let currentPickerType = null; const hueSlider = document.getElementById('picker-hue'), alphaSlider = document.getElementById('picker-alpha');
    function openColorPicker(type) { currentPickerType = type; document.getElementById('mini-picker-backdrop').style.display = 'block'; setTimeout(() => document.getElementById('mini-picker-popup').classList.add('active'), 10); updatePreview(); }
    function closeColorPicker() { document.getElementById('mini-picker-popup').classList.remove('active'); setTimeout(() => document.getElementById('mini-picker-backdrop').style.display = 'none', 200); currentPickerType = null; }
    hueSlider.addEventListener('input', updatePreview); alphaSlider.addEventListener('input', updatePreview);
    function updatePreview() { const h = hueSlider.value, a = alphaSlider.value / 100, color = `hsla(${h}, 100%, 50%, ${a})`; document.getElementById('picker-preview-color').style.backgroundColor = color; document.getElementById('opacity-val').innerText = Math.round(a * 100) + '%'; }
    function applyCustomColor() { if (!currentPickerType) return; const h = hueSlider.value, a = alphaSlider.value / 100, color = `hsla(${h}, 100%, 50%, ${a})`, solid = `hsl(${h}, 100%, 50%)`; if(currentPickerType === 'accent') setThemeColor('accent', solid); else if(currentPickerType === 'bgCard') setThemeColor('bgCard', color); closeColorPicker(); }
    function setThemeColor(key, val) { activeColors[key] = val; applyTheme(activeColors); saveThemeToFirebase(); }
    function applyTheme(t) { const r = document.documentElement.style; if(t.bgCard) r.setProperty('--bg-card', t.bgCard); if(t.accent) r.setProperty('--accent-color', t.accent); if(t.bgImage) { document.getElementById('mobile-bg-layer').style.backgroundImage = `url('${t.bgImage}')`; } document.querySelectorAll('.color-doll').forEach(d => d.classList.remove('active')); }
    function saveThemeToFirebase() { const themeData = { bgBody: '#000000', bgCard: activeColors.bgCard || '#111111', accent: activeColors.accent || '#a855f7', bgImage: document.getElementById('bgImageInput').value, textMain: '#ffffff' }; db.ref('site_settings/theme').set(themeData).then(() => { localStorage.setItem('admin_theme', JSON.stringify(themeData)); showToast("Theme Saved"); }); }

    window.saveUserConfig = function() { db.ref('site_settings').update({ logoUrl: document.getElementById('logoUrlInput').value, userSiteTitle: document.getElementById('userSiteTitle').value, userFavicon: document.getElementById('userFavicon').value, tgLink: document.getElementById('tgLink').value, fbLink: document.getElementById('fbLink').value, tiktokLink: document.getElementById('tiktokLink').value, youtubeLink: document.getElementById('youtubeLink').value, footerText: document.getElementById('footerText').value }).then(()=>showToast("Settings Saved")); }
    window.saveAdminBranding = function() { db.ref('site_settings').update({ adminSiteTitle: document.getElementById('adminSiteTitle').value, adminHeaderLogo: document.getElementById('adminHeaderLogo').value, adminFavicon: document.getElementById('adminFavicon').value, adminBrowserTitle: document.getElementById('adminBrowserTitle').value, adminPassword: document.getElementById('adminPasswordInput').value }).then(()=>showToast("Admin Info Saved")); }
    function showToast(m) { const t = document.getElementById('customToast'); t.querySelector('span').innerText=m; t.classList.add('active'); setTimeout(()=>t.classList.remove('active'), 2000); }
</script>
</body>
</html>
